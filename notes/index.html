<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes — Rajat Koorse</title>
  <meta name="description" content="Personal notes and writings by Rajat Koorse." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📓</text></svg>" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="notes.css" />
</head>
<body>

<!-- ── Login Gate (for private notes) ── -->
<div id="notes-login-gate">
  <div class="gate-card">
    <div class="gate-icon">🔐</div>
    <div class="gate-title">Private Note</div>
    <div class="gate-sub" id="gate-sub-text">Enter admin password to view this note.</div>
    <input type="password" id="gate-password" class="gate-input" placeholder="Admin password..." />
    <button class="gate-btn" onclick="gateLogin()">Unlock</button>
    <div class="gate-error" id="gate-error">Incorrect password</div>
    <div class="gate-dismiss">
      <a href="#" onclick="closeGate(); return false;">← Go back</a>
    </div>
  </div>
</div>

<!-- ── Top Bar ── -->
<header class="notes-topbar">
  <div class="topbar-left">
    <a href="../" class="back-link"><i class="fas fa-arrow-left"></i> Portfolio</a>
    <div class="notes-brand">📓 <span>Notes</span></div>
  </div>
  <div class="topbar-right">
    <span id="admin-badge" style="display:none; font-size:0.75rem; color:var(--cyan); background:var(--cyan-dim); border:1px solid rgba(0,212,255,0.25); padding:4px 12px; border-radius:999px;">
      <i class="fas fa-shield-halved"></i> Admin Mode
    </span>
    <button class="btn btn-ghost btn-sm" id="admin-login-btn" onclick="showGate('admin')" title="Admin Login">
      <i class="fas fa-lock"></i>
    </button>
    <button class="btn btn-ghost btn-sm" id="admin-logout-btn" onclick="doAdminLogout()" style="display:none;" title="Logout">
      <i class="fas fa-lock-open"></i>
    </button>
  </div>
</header>

<!-- ── Layout ── -->
<div class="notes-layout">

  <!-- Sidebar -->
  <aside class="notes-sidebar">
    <div class="sidebar-title">Notes</div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="Search notes..." oninput="filterNotes(this.value)" />
    </div>
    <div id="note-list-sidebar">
      <div class="note-list-empty">Loading notes...</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="notes-main" id="notes-main">

    <!-- Home / Grid View -->
    <div id="notes-home-view" class="notes-home">
      <h1>My Notes</h1>
      <p>Personal notes, learnings, and writings. Some are public, some are private.</p>

      <div class="tags-filter" id="tags-filter"></div>

      <div class="notes-cards" id="notes-cards">
        <div style="color:var(--text3); font-size:0.9rem; padding:20px 0;">Loading notes...</div>
      </div>
    </div>

    <!-- Note Reader -->
    <div id="note-reader" class="note-reader">
      <button class="reader-back" onclick="backToHome()">
        <i class="fas fa-arrow-left"></i> Back to Notes
      </button>
      <div class="reader-header">
        <h1 class="reader-title" id="reader-title"></h1>
        <div class="reader-meta" id="reader-meta"></div>
        <div class="reader-tags" id="reader-tags"></div>
      </div>
      <div class="note-content" id="note-content-body"></div>
    </div>

  </main>
</div>

<!-- marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="notes.js"></script>
</body>
</html>
